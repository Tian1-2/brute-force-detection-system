<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>注册 - SOC平台</title>

<style>

body{
margin:0;
padding:0;
background:#0b1220;
font-family:Arial;
color:#d8e3ff;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:380px;
background:#121c2f;
padding:35px;
border-radius:16px;
box-shadow:0 0 20px rgba(0,0,0,.4);
}

h2{
text-align:center;
margin-bottom:25px;
color:#4ea1ff;
}

input{
width:100%;
padding:12px;
margin-bottom:15px;
border:none;
border-radius:10px;
background:#16243c;
color:white;
outline:none;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#2f7cff;
color:white;
cursor:pointer;
font-size:15px;
}

button:hover{
background:#5193ff;
}

.link{
text-align:center;
margin-top:15px;
font-size:13px;
color:#8ba5d7;
cursor:pointer;
}

.link:hover{
color:#4ea1ff;
}

</style>

</head>

<body>

<div class="card">

<h2>用户注册</h2>

<input id="reg_user" placeholder="用户名">
<input id="reg_pass" type="password" placeholder="密码">

<button onclick="register()">注册</button>

<div class="link" onclick="goLogin()">
已有账号？去登录 →
</div>

</div>

<script>

function register(){

fetch("/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
username:document.getElementById("reg_user").value,
password:document.getElementById("reg_pass").value
})
})
.then(r=>r.json())
.then(data=>{

alert(data.msg);

if(data.msg==="注册成功"){
window.location.href="/login_page";
}

});

}


function goLogin(){
window.location.href="/login_page";
}

</script>

</body>
</html>
