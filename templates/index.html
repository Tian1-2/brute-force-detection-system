<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>暴力破解检测平台</title>

<script src="https://cdn.jsdelivr.net/npm/echarts/dist/echarts.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#0b1220;
color:#d8e3ff;
}

/* 整体布局 */
.container{
display:flex;
height:100vh;
}


/* 左侧导航 */
.sidebar{
width:240px;
background:#121c2f;
padding:30px 20px;
border-right:1px solid #22304a;
}

.logo{
font-size:22px;
font-weight:bold;
margin-bottom:40px;
color:#4ea1ff;
}

.menu-item{
padding:15px;
margin-bottom:12px;
background:#16243c;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.menu-item:hover{
background:#1e3559;
}

.menu-item.active{
background:#244d88;
}


/* 主工作区 */
.main{
flex:1;
padding:25px;
overflow:auto;
}

/* 顶部栏 */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:25px;
}

.topbar-right{
display:flex;
gap:20px;
align-items:center;
}


/* 指标卡片 */
.cards{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-bottom:25px;
}

.card{
background:#121c2f;
padding:25px;
border-radius:16px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

.card-title{
font-size:14px;
color:#8ba5d7;
}

.card-value{
margin-top:10px;
font-size:34px;
font-weight:bold;
}


/* 双列 */
.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
margin-bottom:20px;
}

.panel{
background:#121c2f;
border-radius:16px;
padding:20px;
}

.panel h3{
margin-bottom:18px;
}


/* 表格 */
table{
width:100%;
border-collapse:collapse;
table-layout:fixed;   /* 关键：固定列宽 */
}

th,
td{
padding:12px 14px;
text-align:center;    /* 全部居中就不会视觉偏 */
vertical-align:middle;
}

th{
background:#1b2a44;
font-weight:600;
}

td{
border-bottom:1px solid #22304a;
}


/* 风险详情 */
#detail_panel{
min-height:450px;
background:#0f1727;
padding:15px;
border-radius:12px;
overflow:auto;
}


/* 按钮 */
button{
background:#2f7cff;
color:white;
border:none;
padding:10px 18px;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#5193ff;
}


select,input{
background:#16243c;
color:white;
border:none;
padding:10px;
border-radius:8px;
}


/* 分页 */
.pager{
margin-top:15px;
display:flex;
gap:10px;
}


/* 图表 */
#chart{
height:420px;
}

.detail-link{
background:#2f7cff;
padding:6px 12px;
border-radius:8px;
color:white;
text-decoration:none;
font-weight:600;
display:inline-block;
}

.detail-link:hover{
background:#5193ff;
}

.alert-highlight td{
background:#284d88 !important;
animation:alertFlash 1.5s ease 2;
}

@keyframes alertFlash{

0%{
background:#ff9f43;
}

50%{
background:#284d88;
}

100%{
background:#121c2f;
}

}
</style>
</head>


<body>

<div class="container">

<!-- 左侧导航 -->
<div class="sidebar">

<div class="logo">
SOC监测平台
</div>

<div class="menu-item active">
<a href="/" style="color:white;text-decoration:none;">
🏠 监测总览
</a>
</div>

<div class="menu-item">
<a href="/system_manage"
style="color:white;text-decoration:none;">
📥 监测源管理
</a>
</div>


<div class="menu-item">
    <a href="/logout"
       style="color:white;text-decoration:none;">
        ⚙ 安全退出
    </a>
</div>

</div>



<div class="main">

<!-- 顶部栏 -->
<div class="topbar">

<h2>
暴力破解异常检测控制台
</h2>

<div class="topbar-right">

<select id="system_select">

</select>

<div>
阈值:
<input
type="range"
min="0"
max="1"
step="0.1"
id="threshold"
>
<span id="th_val">
0.3
</span>
</div>

</div>

</div>



<!-- 指标卡 -->
<div class="cards">

<div class="card">
<div class="card-title">活跃告警</div>
<div class="card-value" id="kpi_alerts">-</div>
</div>

<div class="card">
<div class="card-title">高风险用户</div>
<div class="card-value" id="kpi_users">-</div>
</div>

<div class="card">
<div class="card-title">攻击窗口</div>
<div class="card-value" id="kpi_windows">-</div>
</div>

<div class="card">
<div class="card-title">模型准确率</div>
<div class="card-value">93.4%</div>
</div>

</div>



<div class="grid">

<!-- 左侧趋势图 -->
<div class="panel">

<h3>
攻击趋势分析
</h3>

<div id="chart"></div>

</div>


<!-- 右侧排行榜 -->
<div class="panel">

<h3>
高风险用户排行
</h3>

<table>
<thead>
<tr>
<th>排名</th>
<th>用户</th>
<th>风险</th>
</tr>
</thead>

<tbody id="rank_table"></tbody>

</table>

</div>

</div>



<div class="grid">

<!-- 告警表 -->
<div class="panel">

<h3>
风险告警列表
</h3>

<table>
<thead>

<tr>
<th>用户</th>
<th>时间</th>
<th>攻击次数</th>
<th>最大风险</th>
<th>风险时间线</th>
<th>告警状态</th>
<th>详情</th>
</tr>

</thead>

<tbody id="alert_table">
</tbody>

</table>

<div class="pager">
<button onclick="prevPage()">
上一页
</button>

<button onclick="nextPage()">
下一页
</button>
</div>

</div>


<!-- 右侧行为详情 -->
<div class="panel">

<h3>
窗口取证详情
</h3>

<div id="detail_panel">
点击风险色块查看行为序列
</div>

</div>


</div>

</div>

</div>


<script src="/static/main.js"></script>

</body>
</html>
